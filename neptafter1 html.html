<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネプトジャパン 組合再編説明会</title>
    <!-- CSSフレームワーク (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PowerPoint生成ライブラリ (PptxGenJS) -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8fafc;
        }
        .slide-container {
            min-height: 520px;
        }
        /* スライド内のテキストサイズを特大に補正 */
        .slide-content text, .slide-content p, .slide-content li {
            font-size: 1.55rem;
            line-height: 1.8;
        }
        .slide-content h3 {
            font-size: 2.3rem;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex flex-col min-h-screen">

    <!-- ヘッダーエリア -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-wrap justify-between items-center shadow-sm z-10">
        <div>
            <h1 class="text-2xl font-bold text-blue-900 tracking-tight">ネプトジャパン 組合再編説明会</h1>
            <p class="text-sm text-slate-500 font-medium">一般社団法人日本移送医療システム 杉澤 修</p>
        </div>
        
        <!-- コントロールパネル -->
        <div class="flex flex-wrap items-center gap-4 mt-3 lg:mt-0">
            <!-- 音声コントロールエリア -->
            <div class="bg-slate-50 p-2 rounded-xl flex flex-wrap items-center gap-3 border border-slate-200">
                <button id="btn-play" onclick="toggleSpeech()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm transition flex items-center gap-1.5">
                    <span id="icon-play">🔊</span> <span id="text-play">音声再生</span>
                </button>
                <button onclick="stopSpeech()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-bold transition">
                    ⏹ 停止
                </button>
                <!-- 速度選択 -->
                <div class="flex items-center gap-1.5 text-xs text-slate-600 px-1 border-l border-slate-200 pl-3">
                    <label for="speed-ctrl" class="font-bold">速度:</label>
                    <select id="speed-ctrl" onchange="updateSpeed()" class="bg-white border border-slate-300 rounded-md px-1.5 py-1 font-bold text-blue-900 shadow-sm">
                        <option value="1.0">標準</option>
                        <option value="1.2" selected>少し早口</option>
                        <option value="1.4">早口</option>
                    </select>
                </div>
                <!-- 各種チェックボックス -->
                <div class="flex items-center gap-3 border-l border-slate-200 pl-3 text-xs text-slate-600 font-bold">
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="checkbox" id="auto-play" checked class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>自動再生</span>
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="checkbox" id="auto-advance" checked class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>自動ページ送り</span>
                    </label>
                </div>
            </div>
            <!-- パワーポイントエクスポート -->
            <button onclick="exportToPowerPoint()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md transition flex items-center gap-1.5">
                <span>🖥️</span> パワポ書き出し (.pptx)
            </button>
        </div>
    </header>

    <!-- メインビュー -->
    <main class="flex-1 flex flex-col lg:flex-row p-6 gap-6 max-w-7xl w-full mx-auto">
        <!-- 左側：明るくクリアなスライド表示エリア（特大フォント・ライトテーマ） -->
        <div class="flex-1 flex flex-col">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-md p-8 lg:p-10 flex flex-col justify-between slide-container relative overflow-hidden flex-1">
                <!-- スライド上部のアライアンスグラデーションライン -->
                <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-blue-900 via-indigo-800 to-blue-700"></div>
                
                <!-- スライドタイトルヘッダー -->
                <div class="border-b border-slate-100 pb-5 mb-6">
                    <h2 id="slide-title" class="text-3xl lg:text-4xl font-extrabold text-blue-950 tracking-tight">スライドタイトル</h2>
                </div>

                <!-- スライドコンテンツ本体 -->
                <div id="slide-body" class="slide-content flex-1 text-slate-800 font-medium flex flex-col justify-center py-6">
                    <!-- JavaScriptから動的にコンテンツが挿入されます -->
                </div>

                <!-- スライドフッター（ページ番号 ＆ 操作ボタン） -->
                <div class="flex justify-between items-center border-t border-slate-100 pt-5 mt-6">
                    <span id="slide-counter" class="text-sm font-black text-slate-400 tracking-widest">PAGE 1 / 17</span>
                    <div class="flex gap-3">
                        <button onclick="prevSlide()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold border border-slate-200 transition">
                            ◀ 前へ
                        </button>
                        <button onclick="nextSlide()" class="bg-blue-900 hover:bg-blue-800 text-white px-6 py-2.5 rounded-xl font-bold shadow-sm transition">
                            次へ ▶
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側：字幕（スピーチ原稿・プロンプター）エリア -->
        <div class="w-full lg:w-96 flex flex-col">
            <div class="bg-indigo-50/70 border border-indigo-100 rounded-2xl shadow-md p-6 flex flex-col h-full">
                <div class="flex justify-between items-center border-b border-indigo-200 pb-3 mb-4">
                    <h3 class="font-extrabold text-blue-950 flex items-center gap-1.5 text-base">
                        <span>🎙️</span> スピーチ原稿（字幕）
                    </h3>
                    <!-- 字幕サイズ調整 -->
                    <div class="flex gap-1.5">
                        <button onclick="adjustTextSize(1)" class="bg-white hover:bg-slate-50 text-slate-700 text-xs px-2 py-1 rounded-md border border-slate-300 font-bold shadow-sm">A+</button>
                        <button onclick="adjustTextSize(-1)" class="bg-white hover:bg-slate-50 text-slate-700 text-xs px-2 py-1 rounded-md border border-slate-300 font-bold shadow-sm">A-</button>
                    </div>
                </div>
                <!-- 杉澤修スピーチ字幕（動的スクロール連動） -->
                <div id="subtitle-box" class="flex-1 overflow-y-auto text-slate-800 font-semibold leading-relaxed whitespace-pre-wrap pr-1" style="font-size: 1.25rem; max-height: 460px;">
                    <!-- スピーチの字幕文言が動的に表示されます -->
                </div>
            </div>
        </div>
    </main>

    <!-- 最下部フッター -->
    <footer class="bg-slate-900 text-slate-500 text-center py-3 text-xs border-t border-slate-800 font-semibold">
        &copy; 2026 一般社団法人日本移送医療システム 代表理事 杉澤 修.
    </footer>

    <!-- プレゼンテーション全スライドデータ＆制御スクリプト -->
    <script>
        const presentationData = [

        let currentIdx = 0;
        let speechUtterance = null;
        const synth = window.speechSynthesis;

        // ページ読み込み時の初期化
        window.addEventListener('DOMContentLoaded', () => {
            renderSlide(currentIdx);
        });

        // スライド描画処理
        function renderSlide(idx) {
            const data = presentationData[idx];
            document.getElementById('slide-title').innerText = `${idx + 1}. ${data.title}`;
            document.getElementById('slide-body').innerHTML = data.body;
            document.getElementById('slide-counter').innerText = `PAGE ${idx + 1} / ${presentationData.length}`;
            document.getElementById('subtitle-box').innerText = data.speech;
            document.getElementById('subtitle-box').scrollTop = 0;

            // 自動音声再生の処理
            if (document.getElementById('auto-play').checked) {
                stopSpeech();
                // 少し時間をおいてから再生（遷移時のラグ軽減）
                setTimeout(() => {
                    speakCurrentText();
                }, 100);
            }
        }

        function nextSlide() {
            if (currentIdx < presentationData.length - 1) {
                currentIdx++;
                renderSlide(currentIdx);
            } else {
                stopSpeech();
            }
        }

        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                renderSlide(currentIdx);
            }
        }

        // 音声合成 (Web Speech API) コントロール
        function speakCurrentText() {
            if (synth.speaking) {
                synth.cancel();
            }
            const text = presentationData[currentIdx].speech;
            speechUtterance = new SpeechSynthesisUtterance(text);
            
            // 日本語の標準音声を取得・割当
            const voices = synth.getVoices();
            const jaVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.includes('ja'));
            if (jaVoice) speechUtterance.voice = jaVoice;

            // コントロールパネルの再生速度を取得
            const speed = parseFloat(document.getElementById('speed-ctrl').value);
            speechUtterance.rate = speed;

            // 再生開始/終了イベント管理
            speechUtterance.onstart = () => {
                document.getElementById('text-play').innerText = "一時停止";
                document.getElementById('icon-play').innerText = "⏸";
            };
            
            speechUtterance.onend = () => {
                document.getElementById('text-play').innerText = "音声再生";
                document.getElementById('icon-play').innerText = "🔊";
                
                // 自動ページ送りが有効かつスライドが最後でなければ遷移
                const autoAdv = document.getElementById('auto-advance').checked;
                if (autoAdv && currentIdx < presentationData.length - 1) {
                    setTimeout(() => {
                        nextSlide();
                    }, 1000); // スピーチ終了後、1秒のポーズで次へ
                }
            };
            
            speechUtterance.onerror = () => {
                document.getElementById('text-play').innerText = "音声再生";
                document.getElementById('icon-play').innerText = "🔊";
            };

            synth.speak(speechUtterance);
        }

        function toggleSpeech() {
            if (synth.speaking) {
                if (synth.paused) {
                    synth.resume();
                    document.getElementById('text-play').innerText = "一時停止";
                    document.getElementById('icon-play').innerText = "⏸";
                } else {
                    synth.pause();
                    document.getElementById('text-play').innerText = "音声再生";
                    document.getElementById('icon-play').innerText = "🔊";
                }
            } else {
                speakCurrentText();
            }
        }

        function stopSpeech() {
            synth.cancel();
            document.getElementById('text-play').innerText = "音声再生";
            document.getElementById('icon-play').innerText = "🔊";
        }

        function updateSpeed() {
            if (synth.speaking && !synth.paused) {
                speakCurrentText(); // 速度変更を即時に再生反映
            }
        }

        // 字幕のフォントサイズ変更
        function adjustTextSize(direction) {
            const box = document.getElementById('subtitle-box');
            let currentSize = parseFloat(window.getComputedStyle(box, null).getPropertyValue('font-size'));
            box.style.fontSize = (currentSize + (direction * 2)) + 'px';
        }

        // PowerPoint書き出し処理
        function exportToPowerPoint() {
            try {
                let pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                presentationData.forEach((slideData, index) => {
                    let slide = pptx.addSlide();
                    
                    // スライド上部グラデーションの代わりのネイビー帯
                    slide.addShape(pptx.ShapeType.rect, { x: 0.0, y: 0.0, w: '100%', h: 0.45, fill: { color: '1A365D' } });
                    
                    // スライドタイトル
                    slide.addText(`${index + 1}. ${slideData.title}`, {
                        x: 0.5, y: 0.6, w: 12.0, h: 0.8,
                        fontSize: 28, bold: true, color: '1A365D',
                        fontFace: 'MS Gothic'
                    });

                    // メインコンテンツ (HTMLタグを削除しプレーンテキストに加工)
                    let plainBody = slideData.body
                        .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
                        .replace(/<[^>]*>/g, '\n')
                        .replace(/\n\s*\n/g, '\n')
                        .trim();

                    slide.addText(plainBody, {
                        x: 0.6, y: 1.6, w: 12.1, h: 4.8,
                        fontSize: 16, color: '334155',
                        fontFace: 'MS Gothic',
                        valign: 'top',
                        lineSpacing: 24
                    });

                    // ★ スライドノート (パワーポイントのメモ欄) にスピーチ原稿を自動挿入
                    slide.note = slideData.speech;
                });

                // PPTX保存ファイル名の設定
                pptx.writeFile({ fileName: 'ネプトジャパン_組合再編説明会資料' });
            } catch (error) {
                console.error(error);
                alert("PowerPointの生成中にエラーが発生しました。");
            }
